name: Build and Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.architecture }} ${{ matrix.configuration }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            configuration: Debug
            configuration_lower: debug
          - architecture: x64
            configuration: Release
            configuration_lower: release
          - architecture: arm64
            configuration: Debug
            configuration_lower: debug
          - architecture: arm64
            configuration: Release
            configuration_lower: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve build metadata
        id: metadata
        shell: pwsh
        run: |
          .\.github\scripts\resolve-build-metadata.ps1

      - name: Build binaries
        shell: pwsh
        env:
          REMAP_VERSION_TAG: ${{ steps.metadata.outputs.version_tag }}
          REMAP_GIT_HASH: ${{ steps.metadata.outputs.git_hash }}
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          .\build.bat '${{ matrix.configuration }}' '${{ matrix.architecture }}' "$env:REMAP_VERSION_TAG" "$env:REMAP_GIT_HASH"

      - name: Validate outputs
        shell: pwsh
        env:
          REMAP_VERSION_TAG: ${{ steps.metadata.outputs.version_tag }}
          REMAP_GIT_HASH: ${{ steps.metadata.outputs.git_hash }}
        run: |
          .\.github\scripts\validate-outputs.ps1 `
            -OutputDir (Join-Path $env:GITHUB_WORKSPACE 'build\windows\${{ matrix.architecture }}\${{ matrix.configuration_lower }}') `
            -ExpectedVersionTag $env:REMAP_VERSION_TAG `
            -ExpectedGitHash $env:REMAP_GIT_HASH `
            -Architecture '${{ matrix.architecture }}'

      - name: Package release archive
        id: package
        shell: pwsh
        env:
          REMAP_VERSION_TAG: ${{ steps.metadata.outputs.version_tag }}
        run: |
          .\.github\scripts\package-release-archive.ps1 `
            -OutputDir (Join-Path $env:GITHUB_WORKSPACE 'build\windows\${{ matrix.architecture }}\${{ matrix.configuration_lower }}') `
            -VersionTag $env:REMAP_VERSION_TAG `
            -Architecture '${{ matrix.architecture }}' `
            -ConfigurationLower '${{ matrix.configuration_lower }}'

      - name: Upload release archive
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        shell: pwsh
        run: |
          .\.github\scripts\verify-tag-on-main.ps1

      - name: Download archives
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          pattern: remap-*
          merge-multiple: true

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          tag_name="${{ github.ref_name }}"
          assets=(release-assets/*.zip)

          if [ ${#assets[@]} -eq 0 ]; then
            echo "Error: No .zip files found in release-assets/"
            exit 1
          fi

          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release upload "$tag_name" "${assets[@]}" --clobber
            exit 0
          fi

          args=(
            "$tag_name"
            "${assets[@]}"
            --title "$tag_name"
            --notes ""
          )

          if [[ "$tag_name" == *-* ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
